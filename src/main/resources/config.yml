# 登录超时（秒）
login-timeout: 30

# 数据库设置
database:
  type: sqlite
  sqlite-file: plugins/Login_Amturester/playerdata.db
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ''

# 消息自定义
messages:
  welcome-unregistered: "&e欢迎使用小A的Login插件\n&c你还没有注册！\n&a请使用 /register <密码> <确认密码> 注册账号"
  welcome-registered: "&e欢迎使用小A的Login插件\n&a请使用 /login <密码> 登入"
  not-logged-move: "&c你尚未登录，请先使用 /login 登录！"
  not-logged-chat: "&c请先登录后再发言！"
  not-logged-command: "&c请先登录后再执行命令！"
  blacklist-kick: "&c你的IP或账号已被列入黑名单，请自主联系管理员。"

# 管理员权限组配置
admin-groups:
  - admin
  - owner
  - administrator

# 自动登录设置
auto-login:
  enabled: true
  timeout-hours: 6
